name: Publish to Figma Registry

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure Figma registry auth
        run: |
          echo "@josephavelez77:registry=https://registry.figma.com/npm/70be2b81-b1f4-47dc-8d6a-f18bdf96072d/registry/" >> ~/.npmrc
          echo "//registry.figma.com/npm/70be2b81-b1f4-47dc-8d6a-f18bdf96072d/registry/:_authToken=${{ secrets.FIGMA_NPM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
